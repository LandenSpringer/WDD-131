<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Recipebook</title>
    <meta name="description" content="Find a recipe and explore tasty ideas." />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Recipebook" />
    <meta property="og:description" content="Find a recipe and explore tasty ideas." />
    <meta property="og:url" content="https://YOUR_GITHUB_USERNAME.github.io/wdd131/recipes/" />
    <meta property="og:image" content="images/social-preview-image.png" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Recipebook" />
    <meta name="twitter:description" content="Find a recipe and explore tasty ideas." />
    <meta name="twitter:image" content="images/social-preview-image.png" />
    <link rel="icon" href="favicon.ico" />
    <link rel="apple-touch-icon" href="images/apple-touch-icon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Amatic+SC:wght@400;700&display=swap" rel="stylesheet" />

    <link rel="stylesheet" href="recipes.css" />
</head>

<body>
    <header class="site-header">
        <div class="brand">
            <img class="brand-icon" src="images/recipe-book.png" alt="Recipe book icon" />
            <h1 class="brand-title">Recipebook</h1>
        </div>

        <form class="search" role="search">
            <label class="sr-only" for="recipeSearch">Find a recipe</label>
            <input id="recipeSearch" type="search" placeholder="Find a recipe" name="q" />
            <button type="submit" aria-label="Search">
                <img src="images/search.svg" alt="" />
            </button>
        </form>
    </header>

    <main class="content">
        <article class="recipe">
            <img class="recipe-img" src="images/apple-crisp.jpg" alt="A bowl of apple crisp with vanilla ice cream" />

            <div class="recipe-body">
                <span class="tag">dessert</span>

                <h2 class="recipe-title">Apple Crisp</h2>

                <span class="rating" role="img" aria-label="Rating: 4 out of 5 stars">
                    <span aria-hidden="true" class="icon-star">⭐</span>
                    <span aria-hidden="true" class="icon-star">⭐</span>
                    <span aria-hidden="true" class="icon-star">⭐</span>
                    <span aria-hidden="true" class="icon-star">⭐</span>
                    <span aria-hidden="true" class="icon-star-empty">☆</span>
                </span>

                <p class="recipe-desc">
                    This apple crisp recipe is a simple yet delicious fall dessert that's
                    great served warm with vanilla ice cream.
                </p>
            </div>
        </article>
    </main>

    <footer class="site-footer">
        <a class="attrib" href="https://www.flaticon.com/free-icons/recipe" title="recipe icons">
            Recipe icons created by Freepik - Flaticon
        </a>

        <div class="social">
            <a href="#"><img src="images/instagram_icon.svg" alt="instagram icon" /></a>
            <a href="#"><img src="images/youtube_icon.svg" alt="youtube icon" /></a>
            <a href="#"><img src="images/pinterest_icon.svg" alt="pinterest icon" /></a>
        </div>
    </footer>
</body>

</html>
